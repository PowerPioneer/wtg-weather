<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;
function Page() {
  return (
    <DesignCanvas title="/account · agency mode" subtitle="B2B dense. Same URL as consumer, different layout when org is an agency.">

        <DCArtboard id="pro" label="Agency Pro — primary surface" width={1440} height={1160}>
          <window.AgencyDashboard tier="pro" />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Page />);
</script>
