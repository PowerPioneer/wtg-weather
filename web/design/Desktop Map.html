<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WTG · Desktop Map — 3 Variations</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  html, body { margin: 0; padding: 0; background: #1a1a1c; font-family: 'IBM Plex Sans', system-ui, sans-serif; color: #e4e4e7; }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<!-- Canvas -->
<script type="text/babel" src="design-canvas.jsx"></script>

<!-- Data + shared components -->
<script src="map/layers.js"></script>
<script type="text/babel" src="map/MapPanel.jsx"></script>
<script type="text/babel" src="map/MapControls.jsx"></script>

<!-- Variations -->
<script type="text/babel" src="map/VariationAiry.jsx"></script>
<script type="text/babel" src="map/VariationMapFirst.jsx"></script>
<script type="text/babel" src="map/VariationEditorial.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;
const { MapVariationAiry, MapVariationMapFirst, MapVariationEditorial } = window;

function App() {
  return (
    <DesignCanvas>
      <DCSection
        id="desktop-map"
        title="Desktop map — three variations"
        subtitle="All respect the Atlas tokens. Legend swaps per data layer (Preferences = 4 qualitative bins; Temp = diverging; Rain/Sun = sequential; Safety = ordinal). Try the display-mode toggle inside each artboard. Click a country to open the climate drawer. The + zoom button triggers the premium upsell."
      >
        <DCArtboard id="v1-airy" label="A · Airy — Linear / Vercel" width={1440} height={900}>
          <MapVariationAiry />
        </DCArtboard>
        <DCArtboard id="v2-mapfirst" label="B · Map-first — Felt / Mapbox Studio" width={1440} height={900}>
          <MapVariationMapFirst />
        </DCArtboard>
        <DCArtboard id="v3-editorial" label="C · Editorial — Skyscanner / Lonely Planet" width={1440} height={900}>
          <MapVariationEditorial />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
