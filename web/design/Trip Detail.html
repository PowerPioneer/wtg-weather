<style>
  html, body { margin: 0; padding: 0; background: #ECEAE3; font-family: 'IBM Plex Sans', system-ui, sans-serif; color: #0F1B2D; }
  * { box-sizing: border-box; }

  @media print {
    .no-print { display: none !important; }
    body { background: #FFF !important; }

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<body>
<div id="root"></div>

<script src="country/peruData.js"></script>
<script type="text/babel" src="country/CountryKit.jsx"></script>
<script type="text/babel" src="trip/design-canvas.jsx"></script>
<script type="text/babel" src="trip/TripDetail.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;

function Page() {
  return (
    <DesignCanvas title="Trip detail · /trips/[id]" subtitle="Owner view + public-share view · same component, mode flag">
      <DCSection id="trip" title="Trip detail page · two modes">
        <DCArtboard id="owner"  label="Owner view · agency editing the trip"             width={1440} height={2640}>
          <window.TripDetail mode="owner" />
        </DCArtboard>
        <DCArtboard id="public" label="Public view · client / colleague opens shared link" width={1440} height={2640}>
          <window.TripDetail mode="public" />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Page />);
</script>
</body>
