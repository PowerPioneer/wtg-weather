<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<body>
<div id="root"></div>

<!-- Canvas -->
<script type="text/babel" src="design-canvas.jsx"></script>

<!-- Data + shared components -->
<script src="pricing/tierData.js"></script>
<script type="text/babel" src="pricing/PricingKit.jsx"></script>

<!-- Variations -->
<script type="text/babel" src="pricing/VariationCredibility.jsx"></script>
<script type="text/babel" src="pricing/VariationAspirational.jsx"></script>
<script type="text/babel" src="pricing/VariationUtilitarian.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;
const { VariationCredibility, VariationAspirational, VariationUtilitarian } = window;

function App() {
  return (
    <DesignCanvas defaultZoom={0.55}>
      <DCSection
        id="pricing"
        title="Pricing page — three variations"
        subtitle="All three use the Atlas tokens (IBM Plex family, deep navy ink, brass accent, bone paper). They differ in tone, not style system. 5 tiers · Premium emphasised · premium headline + bullets appear on the Premium card across all three. Click an artboard to expand fullscreen."
      >
        <DCArtboard id="v1-credibility" label="A · Credibility — methodology + citations on the page" width={1440} height={3760}>
          <VariationCredibility />
        </DCArtboard>
        <DCArtboard id="v2-aspirational" label="B · Aspirational — mood-first, Premium as the hero" width={1440} height={3840}>
          <VariationAspirational />
        </DCArtboard>
        <DCArtboard id="v3-utilitarian" label="C · Utilitarian — Linear-grade density, comparison dominates" width={1440} height={2640}>
          <VariationUtilitarian />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
