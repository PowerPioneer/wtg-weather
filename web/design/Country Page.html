<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WTG · Country Page (/peru) — 2 Variations</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@300;400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  html, body { margin: 0; padding: 0; background: #1a1a1c; font-family: 'IBM Plex Sans', system-ui, sans-serif; color: #e4e4e7; }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>

<script src="country/peruData.js"></script>
<script type="text/babel" src="country/CountryKit.jsx"></script>

<script type="text/babel" src="country/CountryEditorial.jsx"></script>
<script type="text/babel" src="country/CountryDataFirst.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;

function App() {
  return (
    <DesignCanvas defaultZoom={0.5}>
      <DCSection
        id="country"
        title="Country page /peru — two variations"
        subtitle="Both SSR-safe: all content renders with no JavaScript. Safety breakdown is a CSS-only :checked toggle; month accordion uses native <details>. Charts are inline SVG. 4 Free charts (Temp / Rain / Sun / Wind) + 4 Premium-locked charts (Snow / SST / Heat / Humidity) with a single unlock prompt. Click any artboard to go fullscreen."
      >
        <DCArtboard id="editorial" label="A · Editorial — travel-magazine, serif-led" width={1440} height={4800}>
          <window.CountryEditorial />
        </DCArtboard>
        <DCArtboard id="datafirst" label="B · Data-first — Wikipedia-style, right-rail infobox" width={1440} height={4600}>
          <window.CountryDataFirst />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
